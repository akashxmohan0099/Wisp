name: WispMobile
options:
  bundleIdPrefix: local.wisp
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  WispMobile:
    type: application
    platform: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: local.wisp.mobile
    sources:
      - path: WispMobile
      - path: WispShared
      - path: ../Sources/WispCore
    info:
      path: WispMobile/Info.plist
      properties:
        CFBundleDisplayName: Wisp
        CFBundleURLTypes:
          - CFBundleURLName: local.wisp.mobile
            CFBundleURLSchemes:
              - wisp
        LSApplicationCategoryType: public.app-category.productivity
        NSMicrophoneUsageDescription: Wisp needs microphone access to record dictation.
        NSSpeechRecognitionUsageDescription: Wisp uses speech recognition to transcribe your dictation.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
    entitlements:
      path: WispMobile/WispMobile.entitlements
      properties:
        com.apple.security.application-groups:
          - group.local.wisp.mobile
    dependencies:
      - target: WispKeyboard
        embed: true
  WispKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: WispKeyboard
      - path: WispShared
      - path: ../Sources/WispCore
    info:
      path: WispKeyboard/Info.plist
      properties:
        CFBundleDisplayName: Wisp Keyboard
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
          NSExtensionAttributes:
            IsASCIICapable: true
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
    entitlements:
      path: WispKeyboard/WispKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.local.wisp.mobile
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: true
        PRODUCT_BUNDLE_IDENTIFIER: local.wisp.mobile.keyboard
